name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A9F9A4: ${{ secrets.A9F9A4 }}
          BD49BD: ${{ secrets.BD49BD }}
        run: |
          python3 -c "
          import sys, pathlib, os
          meta_a = os.environ.get('A9F9A4', '')
          meta_b = os.environ.get('BD49BD', '')
          page = pathlib.Path('index.html')
          src = page.read_text(encoding='utf-8')
          out = src
          if meta_a:
              out = out.replace('<!-- a747f3e803053fa7e177b4eb3343ce41 -->', meta_a)
          if meta_b:
              out = out.replace('<!-- bb601fd02b902d2049215fc099 -->', meta_b)
          if out == src and (meta_a or meta_b):
              sys.exit(1)
          if out != src:
              page.write_text(out, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
